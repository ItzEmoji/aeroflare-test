name: Release Please
permissions:
  contents: write
  pull-requests: write
on:
  push:
    branches:
      - main
jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - name: Generate App Token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
      - id: release
        uses: googleapis/release-please-action@v5
        with:
          token: ${{ steps.app-token.outputs.token }}
          config-file: .github/release-please-config.json
          manifest-file: version.json

  build:
    needs: release
    if: ${{ needs.release.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:

      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.release.outputs.tag_name }}
      - uses: actions/setup-go@v6
        with:
          go-version: stable
      - name: Build release binaries
        run: |
          set -euo pipefail
          mkdir -p dist stage
          for target in x86_64:amd64 aarch64:arm64; do
            label="${target%%:*}"
            goarch="${target##*:}"
            for bin in aeroflare aeroflare-ci; do
              case "$bin" in
                aeroflare)    pkg=. ;;
                aeroflare-ci) pkg=./cmd/aeroflare-ci ;;
              esac
              CGO_ENABLED=0 GOOS=linux GOARCH="$goarch" \
                go build -trimpath -ldflags="-s -w" -o "stage/$bin" "$pkg"
              tar --zstd -cf "dist/$bin-$label.tar.zst" -C stage "$bin"
              rm "stage/$bin"
            done
          done
          
      - name: Attest artifacts
        id: attest
        uses: actions/attest@v4
        with:
          subject-path: dist/*.tar.zst

      - name: Upload assets and publish release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.release.outputs.tag_name }}
          files: dist/*
          fail_on_unmatched_files: true

      - name: Move the major version tag
        env:
          TAG: ${{ needs.release.outputs.tag_name }}
        run: |
          set -euo pipefail

          major="${TAG%%.*}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git tag --force "$major" "$TAG"
          git push --force origin "refs/tags/$major"

          echo "Moved $major -> $TAG"
