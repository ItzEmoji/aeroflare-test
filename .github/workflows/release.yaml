name: Release Please
permissions:
  contents: write
  pull-requests: write
on:
  push:
    branches:
      - main
jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - name: Generate App Token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
      - id: release
        uses: googleapis/release-please-action@v5
        with:
          token: ${{ steps.app-token.outputs.token }}
          config-file: .github/release-please-config.json
          manifest-file: version.json

  # release-please creates the release as a draft (see release-please-config.json)
  # and forces the tag into existence. This job attaches the binaries and then
  # publishes the draft. A failed build therefore leaves an unpublished draft
  # rather than a published release with no assets.
  build:
    needs: release
    if: ${{ needs.release.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      # The binaries embed version.json via //go:embed, so build the tagged tree
      # rather than whatever main happens to point at now.
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.release.outputs.tag_name }}
      - uses: actions/setup-go@v6
        with:
          go-version: stable

      - name: Build release binaries
        run: |
          set -euo pipefail
          mkdir -p dist stage
          for target in x86_64:amd64 aarch64:arm64; do
            label="${target%%:*}"
            goarch="${target##*:}"
            for bin in aeroflare aeroflare-ci; do
              case "$bin" in
                aeroflare)    pkg=. ;;
                aeroflare-ci) pkg=./cmd/aeroflare-ci ;;
              esac
              CGO_ENABLED=0 GOOS=linux GOARCH="$goarch" \
                go build -trimpath -ldflags="-s -w" -o "stage/$bin" "$pkg"
              tar --zstd -cf "dist/$bin-$label.tar.zst" -C stage "$bin"
              rm "stage/$bin"
            done
          done
          (cd dist && sha256sum ./*.tar.zst > SHA256SUMS)

      - name: Attest build provenance
        id: attest
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: dist/*.tar.zst

      # Ship the Sigstore bundle so consumers can verify without querying the
      # attestation API. The trusted root is deliberately not shipped: it rotates,
      # and `gh attestation trusted-root` fetches the current one.
      - name: Stage provenance bundle
        run: cp "${{ steps.attest.outputs.bundle-path }}" dist/provenance.jsonl

      # Omitting `draft:` publishes the draft release after the upload.
      - name: Upload assets and publish release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.release.outputs.tag_name }}
          files: dist/*
          fail_on_unmatched_files: true

      # `uses: ItzEmoji/aeroflare@v1` needs a moving major tag. Derive the major
      # from version.json so a future 2.x needs no edit here. Pushes made with
      # GITHUB_TOKEN do not trigger workflows, which is what we want.
      - name: Move the major version tag
        env:
          TAG: ${{ needs.release.outputs.tag_name }}
        run: |
          set -euo pipefail
          version=$(jq -er '.["."]' version.json)
          major="v${version%%.*}"
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f "$major" "$TAG"
          git push -f origin "refs/tags/$major"
          echo "moved $major -> $TAG"
