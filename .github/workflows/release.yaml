name: Release Please
permissions:
  contents: write
  pull-requests: write
on:
  push:
    branches:
      - main
jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - name: Generate App Token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
      - id: release
        uses: googleapis/release-please-action@v5
        with:
          token: ${{ steps.app-token.outputs.token }}
          config-file: .github/release-please-config.json
          manifest-file: version.json

  build:
    needs: release
    if: ${{ needs.release.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:

      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.release.outputs.tag_name }}
      - uses: actions/setup-go@v6
        with:
          go-version: stable
      - name: Build release binaries
        env:
          AEROFLARE_VERSION: ${{ needs.release.outputs.tag_name }}
        run: make dist-all
      - name: Attest artifacts
        id: attest
        uses: actions/attest@v4
        with:
          subject-path: out/*.tar.zst

      - name: Upload assets and publish release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.release.outputs.tag_name }}
          files: out/*
          fail_on_unmatched_files: true

      - name: Move the major version tag
        env:
          TAG: ${{ needs.release.outputs.tag_name }}
        run: |
          set -euo pipefail

          major="${TAG%%.*}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git tag --force "$major" "$TAG"
          git push --force origin "refs/tags/$major"

          echo "Moved $major -> $TAG"

  docker:
    needs: release
    if: ${{ needs.release.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.release.outputs.tag_name }}

      - name: Compute major version tag
        id: majorver
        env:
          TAG: ${{ needs.release.outputs.tag_name }}
        run: |
          set -euo pipefail
          echo "major=${TAG%%.*}" >> "$GITHUB_OUTPUT"

      # No docker/setup-qemu-action: the builder stage cross-compiles the Go
      # binary for each target via TARGETOS/TARGETARCH (see Dockerfile and
      # scripts/build.go) instead of running the toolchain under emulation.
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/itzemoji/aeroflare-proxy:latest
            ghcr.io/itzemoji/aeroflare-proxy:${{ needs.release.outputs.tag_name }}
            ghcr.io/itzemoji/aeroflare-proxy:${{ steps.majorver.outputs.major }}

      - name: Attest image provenance
        uses: actions/attest@v4
        with:
          subject-name: ghcr.io/itzemoji/aeroflare-proxy
          subject-digest: ${{ steps.push.outputs.digest }}
          # push-to-registry defaults to false: GHCR doesn't support the OCI
          # 1.1 Referrers API yet, so pushing the attestation there falls
          # back to a `sha256-<digest>` manifest tag, which shows up as a
          # second, separate version on the package page. The attestation
          # is still recorded and verifiable via GitHub's own attestation
          # store (`gh attestation verify`) without it.

  publish-docs:
    needs: release
    if: ${{ needs.release.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-go@v6
        with:
          go-version: stable

      # proxy.golang.org never polls GitHub; it only fetches a version when a
      # client asks for it. This request is what gets the tag onto pkg.go.dev.
      - name: Request the new version from the module proxy
        env:
          TAG: ${{ needs.release.outputs.tag_name }}
          GOPROXY: https://proxy.golang.org
        run: go list -m "github.com/itzemoji/aeroflare@${TAG}"
