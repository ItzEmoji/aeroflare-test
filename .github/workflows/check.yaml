name: PR Checks
on:
  pull_request:
jobs:
  go-check:
    runs-on: ubuntu-latest
    steps:
      - name: Generate App Token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
      - uses: actions/checkout@v5
        with:
          token: ${{ steps.app-token.outputs.token }}
      - uses: actions/setup-go@v6
        with:
          go-version: stable
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12

  # The composite action cannot be integration-tested on its own PR: it downloads
  # the release matching version.json, which does not exist until this merges.
  # Linting and the stubbed script tests are the whole safety net.
  shell:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: shellcheck
        run: shellcheck scripts/*.sh scripts/test/*.sh
      - name: script tests
        run: bash scripts/test/all.sh
      - name: actionlint
        uses: raven-actions/actionlint@v2

  # default.nix has no CI coverage anywhere else, and its failure mode is silent:
  # a stale vendorHash or an eval error only surfaces when someone runs
  # `nix build`. Gate every PR on it, release PRs included.
  nix-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: DeterminateSystems/nix-installer-action@v20
      - name: nix build
        run: nix build .#default --no-link --print-build-logs
