name = "aeroflare-proxy"
main = "worker.js"
compatibility_date = "2026-06-20"

# Configurable environment variables. No registry is hardcoded — point these at
# any OCI registry (GHCR, Docker Hub, GitLab, Gitea/Forgejo, ACR, GCR, ...).
[vars]
# Registry base URL, WITH scheme but WITHOUT /v2 (the worker adds the spec's /v2 API prefix itself). 
# Examples:
#   https://ghcr.io
#   https://registry.gitlab.com
#   https://<region>-docker.pkg.dev
# NIXCACHE_REGISTRY_URL = "https://ghcr.io"

# Repository path, exactly as it lives in the registry (no auto-suffixing).
# NIXCACHE_REPO = "<NIXCACHE_REPO>"

# Optional: username paired with NIXCACHE_TOKEN for the Basic token exchange
# (default "token"; some registries want a specific user, e.g. GCR "_json_key").
# NIXCACHE_USERNAME = "token"

# Optional: registry credential, set as a SECRET (not a plaintext var). Used two
# ways automatically: tried verbatim as a Bearer first (ready JWTs / registries
# that accept the raw token), and as the Basic-auth password at the token realm
# discovered from the registry's 401 challenge (private repos on any registry):
#   wrangler secret put NIXCACHE_TOKEN
# When absent, the worker mints anonymous tokens (public repos).
